<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset=UTF-8">
  <meta name="viewport" content="user-scalacle=no, initial-scale=1">
  <title>길-윤동주</title>
</head>

<body>
  <div class="poem-box">
    <h1>길</h1>
    <h2>윤동주</h2>
    <div class="poem">
    <p>잃어버렸습니다.</p>
    <p>무얼 어디다 잃어버렸는지 몰라</p>
    <p>두 손이 주머니를 더듬어</p>
    <p>길게 나아갑니다.</p>
    <br>
    <p>돌과 돌과 돌이 끝없이 연달아</p>
    <p>같은 돌담을 끼고 갑니다.</p>
  </body>
  
</html>
