<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 교수가 해주는 발표 피드백</title>

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Escoredream';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-4Regular.woff') format('woff');
      font-weight: 400;
    }

    @font-face {
      font-family: 'Escoredream';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-6Bold.woff') format('woff');
      font-weight: 600;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f6f1;
      font-family: 'Escoredream', sans-serif;
      color: #2f3a35;
    }

    .page-wrap {
      max-width: 1080px;
      margin: 60px auto;
      padding: 0 22px;
    }

    .top-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #fff;
      color: #2f3a35;
      text-decoration: none;
      padding: 11px 18px;
      border: 1px solid #e4e1d8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .nav-btn.active {
      background: #2f3a35;
      color: #fff;
      border-color: #2f3a35;
    }

    .main-card {
      background: #fff;
      border: 1px solid #e4e1d8;
      border-radius: 14px;
      padding: 48px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .sub {
      color: #777;
      font-size: 16px;
      margin-bottom: 34px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 18px;
      border: 1px solid #d9d6ce;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1.8;
      resize: vertical;
      font-family: 'Escoredream', sans-serif;
      outline: none;
    }

    textarea:focus {
      border-color: #5f7f63;
    }

    .timer-box {
      margin-top: 28px;
      padding: 28px;
      background: #f8f8f4;
      border: 1px solid #e5e2d9;
      border-radius: 10px;
      text-align: center;
    }

    #timer {
      font-size: 46px;
      font-weight: 600;
      color: #5f7f63;
      margin-bottom: 18px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 24px;
      background: #5f7f63;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Escoredream', sans-serif;
      cursor: pointer;
    }

    button:hover {
      background: #415f4a;
    }

    .sub-btn {
      background: #2f3a35;
    }

    .sub-btn:hover {
      background: #1f2a25;
    }

    .section-box {
      margin-top: 28px;
      background: #fafafa;
      border: 1px solid #e5e2d9;
      border-radius: 10px;
      padding: 30px;
    }

    .check-group {
      margin-bottom: 28px;
    }

    .check-group:last-child {
      margin-bottom: 0;
    }

    h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #2f3a35;
    }

    label {
      display: block;
      padding: 11px 0;
      border-bottom: 1px solid #e5e5e5;
      color: #444;
      font-size: 15px;
    }

    label:last-child {
      border-bottom: none;
    }

    input[type="checkbox"] {
      margin-right: 10px;
    }

    #result {
      margin-top: 28px;
      padding: 28px;
      background: #fafafa;
      border: 1px solid #e5e2d9;
      border-radius: 10px;
      white-space: pre-line;
      line-height: 1.9;
      color: #444;
    }

    @media(max-width: 600px) {
      .main-card {
        padding: 30px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="page-wrap">

    <nav class="top-nav">
      <a href="index.html" class="nav-btn">홈</a>
      <a href="preparepage.html" class="nav-btn">발표 준비</a>
      <a href="pptpage.html" class="nav-btn">PPT 피드백</a>
      <a href="aipage.html" class="nav-btn active">발표 피드백</a>
      <a href="question.html" class="nav-btn">예상 질문</a>
    </nav>

    <div class="main-card">

      <h1>AI 발표 피드백</h1>

      <p class="sub">
        먼저 발표 대본을 입력하고 연습 시간을 측정해보세요. 체크 결과를 바탕으로 피드백을 해드릴게요!
      </p>

      <textarea
        id="scriptText"
        placeholder="여기에 발표 대본을 입력하세요.&#10;&#10;예: 안녕하세요. 저는 오늘 무성영화 시대의 변사라는 직업을 주제로 발표하겠습니다..."
      ></textarea>

      <div class="timer-box">
        <div id="timer">00:00</div>

        <div class="button-row">
          <button onclick="startPractice()">발표 시작</button>
          <button class="sub-btn" onclick="endPractice()">발표 종료</button>
        </div>
      </div>

      <div class="section-box">

        <div class="check-group">
          <h3>시선</h3>
          <label><input type="checkbox" class="check" data-category="시선"> 화면이나 청중을 보려고 했다</label>
          <label><input type="checkbox" class="check" data-category="시선"> 대본만 계속 보지 않았다</label>
          <label><input type="checkbox" class="check" data-category="시선"> 중요한 부분에서 시선을 들었다</label>
        </div>

        <div class="check-group">
          <h3>말 속도</h3>
          <label><input type="checkbox" class="check" data-category="말 속도"> 너무 빠르게 읽지 않았다</label>
          <label><input type="checkbox" class="check" data-category="말 속도"> 문장 사이에 잠깐씩 쉬었다</label>
          <label><input type="checkbox" class="check" data-category="말 속도"> 강조할 부분은 천천히 말했다</label>
        </div>

        <div class="check-group">
          <h3>목소리</h3>
          <label><input type="checkbox" class="check" data-category="목소리"> 끝까지 들릴 정도의 크기로 말했다</label>
          <label><input type="checkbox" class="check" data-category="목소리"> 말끝을 흐리지 않았다</label>
          <label><input type="checkbox" class="check" data-category="목소리"> 목소리 높낮이에 변화가 있었다</label>
        </div>

        <div class="check-group">
          <h3>내용 전달</h3>
          <label><input type="checkbox" class="check" data-category="내용 전달"> 발표하다가 중간에 끊기지 않았다</label>
          <label><input type="checkbox" class="check" data-category="내용 전달"> 핵심 내용을 분명하게 말했다</label>
          <label><input type="checkbox" class="check" data-category="내용 전달"> 마무리를 자연스럽게 했다</label>
        </div>

      </div>

      <div class="button-row" style="margin-top:24px;">
        <button onclick="makeFeedback()">AI 교수의 피드백 받기</button>
      </div>

      <div id="result">
        발표를 시작하고 종료한 뒤, 체크리스트를 선택하면 피드백이 표시됩니다.
      </div>

    </div>

  </div>

  <script>
    let startTime;
    let endTime;
    let timerInterval;
    let totalSeconds = 0;

    function startPractice() {
      startTime = new Date();
      endTime = null;
      totalSeconds = 0;

      clearInterval(timerInterval);

      timerInterval = setInterval(function() {
        const now = new Date();
        totalSeconds = Math.floor((now - startTime) / 1000);

        const min = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
        const sec = String(totalSeconds % 60).padStart(2, "0");

        document.getElementById("timer").innerText = min + ":" + sec;
      }, 1000);

      document.getElementById("result").innerText =
        "발표 연습 중입니다. 끝나면 발표 종료를 눌러주세요.";
    }

    function endPractice() {
      if (!startTime) {
        alert("먼저 발표 시작을 눌러주세요.");
        return;
      }

      endTime = new Date();
      clearInterval(timerInterval);

      totalSeconds = Math.floor((endTime - startTime) / 1000);

      const min = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const sec = String(totalSeconds % 60).padStart(2, "0");

      document.getElementById("timer").innerText = min + ":" + sec;

      document.getElementById("result").innerText =
        "발표 연습이 종료되었습니다.\n체크리스트를 선택한 뒤 AI 피드백 받기를 눌러주세요.";
    }

    async function makeFeedback() {
      const scriptText = document.getElementById("scriptText").value;
      const result = document.getElementById("result");

      if (scriptText.trim() === "") {
        result.innerText = "발표 대본을 입력해주세요.";
        return;
      }

      if (!endTime) {
        result.innerText = "발표 시작 후 발표 종료를 먼저 눌러주세요.";
        return;
      }

      const checkedItems = [];
      const checks = document.querySelectorAll(".check");

      checks.forEach(function(item) {
        if (item.checked) {
          checkedItems.push(
            "[" + item.dataset.category + "] " +
            item.parentElement.innerText.trim()
          );
        }
      });

      const minute = Math.floor(totalSeconds / 60);
      const second = totalSeconds % 60;
      const scriptLength = scriptText.length;

      result.innerText = "AI가 발표 결과를 분석하는 중입니다...";

      const API_KEY = "AQ.Ab8RN6L72uFcRJGBkj7oTziqz4qB5dvujtIMLo7tV21kusV1dw";

      try {
        const response = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              contents: [
                {
                  parts: [
                    {
                      text:
                        "다음 발표 연습 결과를 바탕으로 대학생 발표 피드백을 한국어로 작성해줘. " +
                        "피드백은 1. 발표 시간, 2. 시선, 3. 말 속도, 4. 목소리, 5. 내용 전달, 6. 개선할 점으로 나눠줘. " +
                        "체크된 항목은 잘한 점으로 보고, 체크되지 않은 부분은 보완점으로 추론해서 작성해줘. " +
                        "너무 딱딱하지 않게, 실제 발표를 준비하는 학생에게 말해주듯이 작성해줘.\n\n" +
                        "발표 대본:\n" + scriptText + "\n\n" +
                        "발표 시간: " + minute + "분 " + second + "초\n" +
                        "대본 글자 수: " + scriptLength + "자\n" +
                        "체크된 항목:\n" + checkedItems.join("\n")
                    }
                  ]
                }
              ]
            })
          }
        );

        const data = await response.json();
        console.log(data);

        if (data.error) {
          result.innerText = "API 오류:\n" + data.error.message;
          return;
        }

        result.innerText = data.candidates[0].content.parts[0].text;

      } catch (error) {
        console.log(error);
        result.innerText = "다시 시도해주세요.";
      }
    }
  </script>

</body>

</html>
