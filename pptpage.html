<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI PPT 피드백</title>

  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Escoredream';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-4Regular.woff') format('woff');
      font-weight: 400;
    }

    @font-face {
      font-family: 'Escoredream';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/S-CoreDream-6Bold.woff') format('woff');
      font-weight: 600;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f6f1;
      font-family: 'Escoredream', sans-serif;
      color: #2f3a35;
    }

    .page-wrap {
      max-width: 1080px;
      margin: 60px auto;
      padding: 0 22px;
    }

    .top-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .nav-btn {
      background: #fff;
      color: #2f3a35;
      text-decoration: none;
      padding: 11px 18px;
      border: 1px solid #e4e1d8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .nav-btn.active {
      background: #2f3a35;
      color: #fff;
      border-color: #2f3a35;
    }

    .main-card {
      background: #fff;
      border: 1px solid #e4e1d8;
      border-radius: 14px;
      padding: 48px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    h1 {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .sub {
      color: #777;
      font-size: 16px;
      margin-bottom: 34px;
      line-height: 1.7;
    }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    input,
    textarea {
      width: 100%;
      padding: 16px;
      border: 1px solid #d9d6ce;
      border-radius: 6px;
      font-size: 15px;
      font-family: 'Escoredream', sans-serif;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #5f7f63;
    }

    textarea {
      min-height: 230px;
      line-height: 1.8;
      resize: vertical;
    }

    .section-box {
      margin-top: 28px;
      background: #fafafa;
      border: 1px solid #e5e2d9;
      border-radius: 10px;
      padding: 30px;
    }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .check-sector {
      background: #fff;
      border: 1px solid #e5e2d9;
      border-radius: 8px;
      padding: 22px;
    }

    h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    label {
      display: block;
      padding: 11px 0;
      border-bottom: 1px solid #eeeeee;
      color: #444;
      font-size: 15px;
      line-height: 1.6;
    }

    label:last-child {
      border-bottom: none;
    }

    input[type="checkbox"] {
      width: auto;
      margin-right: 10px;
    }

    .button-row {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    button {
      padding: 14px 28px;
      background: #5f7f63;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Escoredream', sans-serif;
      cursor: pointer;
    }

    button:hover {
      background: #415f4a;
    }

    #result {
      margin-top: 28px;
      padding: 28px;
      background: #fafafa;
      border: 1px solid #e5e2d9;
      border-radius: 10px;
      white-space: pre-line;
      line-height: 1.9;
      color: #444;
    }

    @media(max-width: 800px) {
      .input-grid,
      .check-grid {
        grid-template-columns: 1fr;
      }
    }

    @media(max-width: 600px) {
      .main-card {
        padding: 30px;
      }

      h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <div class="page-wrap">

    <nav class="top-nav">
      <a href="index.html" class="nav-btn">홈</a>
      <a href="preparepage.html" class="nav-btn">발표 준비</a>
      <a href="pptpage.html" class="nav-btn active">PPT 피드백</a>
      <a href="aipage.html" class="nav-btn">발표 피드백</a>
      <a href="question.html" class="nav-btn">예상 질문</a>
    </nav>

    <div class="main-card">

      <h1>AI의 PPT 피드백</h1>

      <p class="sub">
        발표 주제와 PPT 내용을 입력하면 구성, 가독성, 디자인, 대본 연결 방향까지 피드백을 받을 수 있습니다.
      </p>

      <div class="input-grid">
        <input type="text" id="topic" placeholder="발표 주제">
        <input type="number" id="slideCount" placeholder="슬라이드 수">
      </div>

      <textarea
        id="pptContent"
        placeholder="PPT에 들어간 핵심 내용을 적어주세요.&#10;&#10;예:&#10;1장 - 무성영화 시대 소개&#10;2장 - 변사의 역할&#10;3장 - 변사가 관객에게 미친 영향&#10;4장 - 유성영화 등장 이후 변사의 쇠퇴"
      ></textarea>

      <div class="section-box">
        <div class="check-grid">

          <div class="check-sector">
            <h3>구성</h3>
            <label><input type="checkbox" class="check" data-category="구성"> 도입-본론-결론 흐름이 있다</label>
            <label><input type="checkbox" class="check" data-category="구성"> 첫 장에서 발표 주제가 분명하다</label>
            <label><input type="checkbox" class="check" data-category="구성"> 마지막 장에 핵심 정리가 있다</label>
          </div>

          <div class="check-sector">
            <h3>가독성</h3>
            <label><input type="checkbox" class="check" data-category="가독성"> 한 슬라이드에 글자가 너무 많지 않다</label>
            <label><input type="checkbox" class="check" data-category="가독성"> 제목과 본문 크기 차이가 있다</label>
            <label><input type="checkbox" class="check" data-category="가독성"> 중요한 단어가 강조되어 있다</label>
          </div>

          <div class="check-sector">
            <h3>디자인</h3>
            <label><input type="checkbox" class="check" data-category="디자인"> 색상이 전체적으로 통일되어 있다</label>
            <label><input type="checkbox" class="check" data-category="디자인"> 이미지와 글의 비율이 적절하다</label>
            <label><input type="checkbox" class="check" data-category="디자인"> 배경과 글자 색 대비가 잘 보인다</label>
          </div>

          <div class="check-sector">
            <h3>발표 적합성</h3>
            <label><input type="checkbox" class="check" data-category="발표 적합성"> PPT만 봐도 발표 흐름이 보인다</label>
            <label><input type="checkbox" class="check" data-category="발표 적합성"> 발표자가 설명할 여백이 있다</label>
          </div>

        </div>
      </div>

      <div class="button-row">
        <button onclick="makePptFeedback()">AI의 PPT 피드백 받기</button>
      </div>

      <div id="result">
        PPT 내용을 입력하고 체크리스트를 선택하면 피드백을 해드릴게요!
      </div>

    </div>

  </div>

  <script>
  async function makePptFeedback() {

    const subject = localStorage.getItem("projectSubject") || "";
    const topic = document.getElementById("topic").value;
    const slideCount = document.getElementById("slideCount").value;
    const pptContent = document.getElementById("pptContent").value;
    const result = document.getElementById("result");

      if (topic.trim() === "" || pptContent.trim() === "") {
        result.innerText = "발표 주제와 PPT 핵심 내용을 입력해주세요.";
        return;
      }

      const checkedItems = [];
      const uncheckedItems = [];
      const checks = document.querySelectorAll(".check");

      checks.forEach(function(item) {
        const category = item.dataset.category;
        const text = item.parentElement.innerText.trim();

        if (item.checked) {
          checkedItems.push(category + " - " + text);
        } else {
          uncheckedItems.push(category + " - " + text);
        }
      });

      result.innerText = "AI가 PPT 내용을 분석하는 중입니다...";

      const API_KEY = "AQ.Ab8RN6L72uFcRJGBkj7oTziqz4qB5dvujtIMLo7tV21kusV1dw";

      try {
        const response = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              contents: [
                {
                  parts: [
                    {
                      text:
                        "다음 PPT 발표 자료 정보를 바탕으로 대학생 발표용 PPT 피드백을 한국어로 작성해줘.\n\n" +

                        "PPT 내용을 직접 분석해서 중요해 보이는 부분을 찾아주고, " +
                        "그 부분을 발표 대본에서 어떻게 강조하면 좋을지도 제안해줘.\n" +

                        "또 PPT에 넣기엔 너무 복잡하거나 긴 내용이 있다면, " +
                        "어떤 단어를 굵게 하거나 색으로 강조하면 좋을지, " +
                        "키워드 중심으로 어떻게 줄이면 좋을지도 알려줘.\n\n" +

                        "답변은 아래 형식으로 작성해줘.\n\n" +

                        "1. PPT 전체 피드백\n" +
                        "- 전체 흐름과 발표 주제 전달이 잘 되는지 말해줘.\n\n" +

                        "2. 구성 피드백\n" +
                        "- 도입, 본론, 결론 흐름이 자연스러운지 말해줘.\n\n" +

                        "3. 가독성 피드백\n" +
                        "- 글자 양, 제목과 본문 구분, 중요한 단어 강조 여부를 말해줘.\n\n" +

                        "4. 디자인 피드백\n" +
                        "- 색상, 이미지, 분위기 통일성을 말해줘.\n\n" +

                        "5. 발표 대본 Hint\n" +
                        "- PPT 내용 중 발표 대본에서 꼭 강조하면 좋을 핵심 내용을 찾아줘.\n" +
                        "- '이 점을 대본 작성할 때 강조해봐!'라는 말투를 포함해줘.\n" +
                        "- 발표자가 실제로 말할 수 있는 문장 예시도 1개 제안해줘.\n\n" +

                        "6. PPT 수정 Hint\n" +
                        "- PPT에 넣기엔 너무 복잡해 보이는 내용을 찾아줘.\n" +
                        "- 이럴 땐 어떤 단어를 색으로 강조하거나 굵게 하면 좋을지 알려줘.\n" +
                        "- 가능하면 키워드 중심 예시도 보여줘.\n\n" +

                        "7. 교수님이 지적할 수 있는 부분\n" +
                        "- 교수님 입장에서 물어볼 만한 질문이나 아쉬운 부분을 말해줘.\n\n" +

                        "8. POINT!\n" +
                        "- '내가 생각하기엔 ~부분이 중요해 보여!' 형식으로 작성해줘.\n" +
                        "- 그 부분을 PPT와 발표 대본에서 어떻게 살리면 좋을지 같이 말해줘.\n\n" +

                        "9. AI의 한마디\n" +
                        "- 발표 준비를 도와주는 친구처럼 짧게 마무리 조언을 해줘.\n\n" +

                        "체크된 항목은 잘한 점으로 보고, 체크되지 않은 항목은 보완점으로 반영해줘.\n" +
                        "너무 딱딱하지 않게 자연스럽게 작성해줘.\n\n" +

                        "과목명: " + subject + "\n" +
                        "발표 주제: " + topic + "\n" +
                        "슬라이드 수: " + slideCount + "\n" +

                        "PPT 핵심 내용:\n" + pptContent + "\n\n" +

                        "체크된 항목:\n" + checkedItems.join("\n") + "\n\n" +
                        "체크되지 않은 항목:\n" + uncheckedItems.join("\n")
                    }
                  ]
                }
              ]
            })
          }
        );

        const data = await response.json();
        console.log(data);

        if (data.error) {
          result.innerText = "API 오류:\n" + data.error.message;
          return;
        }

        result.innerText = data.candidates[0].content.parts[0].text;

      } catch (error) {
        console.log(error);
        result.innerText = "다시 시도해주세요.";
      }
    }
  </script>

</body>

</html>
